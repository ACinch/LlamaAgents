{% extends "base.html" %}
{% block title %}llama-agents — dashboard{% endblock %}
{% block content %}
<div class="grid">
    {% for status, label in [
        ("inbox", "Inbox"),
        ("processing", "Processing"),
        ("done", "Done"),
        ("failed", "Failed"),
    ] %}
    <div class="panel">
        <h2>{{ label }}</h2>
        <ul hx-get="/api/jobs/{{ status }}"
            hx-trigger="load, every 2s"
            hx-swap="innerHTML"></ul>
    </div>
    {% endfor %}
</div>
{% endblock %}

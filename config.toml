[llama]
server_url = "http://127.0.0.1:8080"
model = "qwen3.6-35b-uncensored"
auto_spawn = true
kill_on_exit = true
server_bin = "D:/repos/llm/llama.cpp/build/bin/Release/llama-server.exe"
model_path = "D:/repos/LLM/GGUF/Qwen36/Qwen3.6-35B-A3B-Uncensored-HauhauCS-Aggressive-Q2_K_P.gguf"
ngl = 999
ctx_size = 65536
n_parallel = 2
startup_timeout_seconds = 300

[agent]
max_iterations = 20
max_concurrent_agents = 5
token_budget_pct = 0.8

[sandbox]
allowed_dirs = ["D:/repos/LLM/llama-agents","C:/backup/Private/Stories"]
shell_allowlist = ["git", "pytest"]

[http]
host = "127.0.0.1"
port = 9000

[[mcp_servers]]
name = "rag"
command = "node"
args = ["D:/repos/LLM/rag/dist/index.js"]

[memory]
enabled = true
root = ".llama_agents/memory"
embedding_model = "BAAI/bge-small-en-v1.5"
chunk_size = 1500
chunk_overlap = 150
plan_recall_k = 3
plan_recall_threshold = 0.5
subagent_inline_threshold_chars = 2000
subagent_summary_max_tokens = 400
evict_threshold_pct = 70
evict_tool_result_min_chars = 4000
scratch_retention_hours = 24

[queue]
enabled = false
